name: bundle

# Build INSTALLERS for every platform an end user might have — they double-click
# and install, never touch a toolchain. Produces: macOS .dmg (Apple Silicon +
# Intel), Windows .msi + .exe (NSIS), Linux .deb + .AppImage, Android .apk.
#
# Trigger: push a tag (vX.Y.Z) → a DRAFT GitHub release with every installer
# attached; or run manually to get the same set as workflow artifacts.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# tauri-action attaches installers to the draft release on tag runs; the default
# GITHUB_TOKEN is read-only, so without this every upload dies with "Resource
# not accessible by integration" — AFTER the build succeeds.
permissions:
  contents: write

jobs:
  # ---------- desktop: macOS / Windows / Linux ----------
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: swatinem/rust-cache@v2

      # Linux: Tauri (webkit2gtk) + embedded runtimes (cmake/clang).
      - name: Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf cmake libclang-dev

      - name: Build the canonical UI
        run: node ui-dc/build.mjs

      - name: Generate icon set
        run: npx --yes @tauri-apps/cli@^2 icon crates/vena-app/icons/icon.png -o crates/vena-app/icons

      - name: Build + bundle installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # macOS deployment target is driven by tauri.conf.json
          # (bundle.macOS.minimumSystemVersion = 11.0): Tauri exports it as
          # MACOSX_DEPLOYMENT_TARGET for the whole cargo build, so the embedded
          # stable-diffusion.cpp / llama.cpp C++ (std::filesystem needs 10.15+)
          # compiles. Setting the env var here instead does NOT work — Tauri
          # overrides it from the config.
          projectPath: crates/vena-app
          args: --features tauri --target ${{ matrix.target }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "Vena ${{ github.ref_name }}"
          releaseDraft: true

      - name: Upload installers (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: vena-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

  # ---------- mobile: Android .apk ----------
  android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: swatinem/rust-cache@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Android SDK
        uses: android-actions/setup-android@v3
      - name: Android NDK
        run: |
          echo "NDK_HOME=$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk | tail -1)" >> $GITHUB_ENV

      - name: Linux system deps
        run: sudo apt-get update && sudo apt-get install -y cmake libclang-dev

      - name: Build the canonical UI
        run: node ui-dc/build.mjs

      # Use the CARGO Tauri CLI (not npx) throughout the Android build. Tauri's
      # mobile Gradle project calls the CLI back to rebuild the Rust lib per-ABI
      # (task :app:rustBuildArm64Release); when init'd via npx it records `npm`
      # as that runner and Gradle then fails with `npm error enoent` (there is no
      # package.json). `cargo tauri` records itself, so the callback is self
      # contained — no Node runner needed.
      - name: Install Tauri CLI (cargo)
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Generate icon set
        run: cargo tauri icon crates/vena-app/icons/icon.png -o crates/vena-app/icons

      - name: Init Android project
        working-directory: crates/vena-app
        run: cargo tauri android init --ci

      # Mobile ships EMBEDDED CHAT (llama.cpp) so the companion works out of the
      # box: download the POCKET tier in the welcome stepper — no account, no
      # API key. Embedded PAINT stays off (SD on a phone is impractical and its
      # sys crate does not cross-compile to the NDK); images use relay or stay
      # typographic. `--no-default-features` drops embedded-paint, then
      # embedded-llm is re-enabled as a native --features flag.
      - name: Build APK
        working-directory: crates/vena-app
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
        # `--features` is a native tauri flag (tauri also injects custom-protocol);
        # `--no-default-features` isn't, so it's passed through to cargo after `--`.
        run: cargo tauri android build --apk --target aarch64 --features tauri,embedded-llm -- --no-default-features

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vena-android-apk
          path: crates/vena-app/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
