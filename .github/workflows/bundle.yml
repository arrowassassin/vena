name: bundle

# Build INSTALLERS for every platform an end user might have — they double-click
# and install, never touch a toolchain. Produces: macOS .dmg (Apple Silicon +
# Intel), Windows .msi + .exe (NSIS), Linux .deb + .AppImage, Android .apk.
#
# Trigger: push a tag (vX.Y.Z) → a DRAFT GitHub release with every installer
# attached; or run manually to get the same set as workflow artifacts.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ---------- desktop: macOS / Windows / Linux ----------
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: swatinem/rust-cache@v2

      # Linux: Tauri (webkit2gtk) + embedded runtimes (cmake/clang).
      - name: Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf cmake libclang-dev

      - name: Build the canonical UI
        run: node ui-dc/build.mjs

      - name: Generate icon set
        run: npx --yes @tauri-apps/cli@^2 icon crates/vena-app/icons/icon.png -o crates/vena-app/icons

      - name: Build + bundle installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/vena-app
          args: --features tauri --target ${{ matrix.target }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "Vena ${{ github.ref_name }}"
          releaseDraft: true

      - name: Upload installers (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: vena-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

  # ---------- mobile: Android .apk ----------
  android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: swatinem/rust-cache@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Android SDK
        uses: android-actions/setup-android@v3
      - name: Android NDK
        run: |
          echo "NDK_HOME=$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk | tail -1)" >> $GITHUB_ENV

      - name: Linux system deps
        run: sudo apt-get update && sudo apt-get install -y cmake libclang-dev

      - name: Build the canonical UI
        run: node ui-dc/build.mjs
      - name: Generate icon set
        run: npx --yes @tauri-apps/cli@^2 icon crates/vena-app/icons/icon.png -o crates/vena-app/icons

      - name: Init Android project
        working-directory: crates/vena-app
        run: npx --yes @tauri-apps/cli@^2 android init --ci

      - name: Build APK
        working-directory: crates/vena-app
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
        run: npx --yes @tauri-apps/cli@^2 android build --apk --target aarch64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vena-android-apk
          path: crates/vena-app/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
