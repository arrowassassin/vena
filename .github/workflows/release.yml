name: release

# Package the REAL app — end users install a .dmg, never a toolchain.
# Trigger: push a tag like v0.1.0, or run manually from the Actions tab.
#
# Unsigned builds work locally (right-click → Open on first launch). To sign +
# notarize for distribution, add these repo secrets and uncomment the env
# block below: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_ID,
# APPLE_PASSWORD (app-specific), APPLE_TEAM_ID.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  macos:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin # Apple Silicon
          - target: x86_64-apple-darwin  # Intel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: swatinem/rust-cache@v2

      - name: Build the canonical UI
        run: node ui-dc/build.mjs

      - name: Generate icon set from the source mark
        run: npx --yes @tauri-apps/cli@^2 icon crates/vena-app/icons/icon.png -o crates/vena-app/icons

      - name: Build + bundle (dmg/app)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing (uncomment once the secrets exist):
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: crates/vena-app
          args: --features tauri --target ${{ matrix.target }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "Vena ${{ github.ref_name }}"
          releaseDraft: true

      - name: Upload artifacts (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: vena-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app
